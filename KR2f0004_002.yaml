body:
  text: 欽定四庫全書大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷二敦睦順治十三年丙申八月丙子上遣官宣慰科爾沁及諸國敕曰爾等秉資忠直當太祖太宗開創之時即誠心效順結為姻婭請為屏藩太祖太宗嘉爾等勳勞崇以爵號賞賚有加恩至渥焉朝覲往來時令陛見教誨飲食異數有加凡有懷欲吐俱得奏陳情意和諧如同父子朕荷祖宗鴻庥統一寰㝢恐於祖宗德意有違成憲未合恆用憂惕但初年朕在幼冲睿王攝政任意變更不遵舊制所行悖逆以致衆怒羣怨使爾等夙夜望朕親政長保恩惠如得復見太祖太宗乃朕自親政以來六年於兹矣未得一見豈朕忘爾等哉蓋因地廣事煩萬幾少暇且痘疹流行爾等逺來之日朕復出巡幸是以相見甚疏然相見之疏固自有由而懷爾之誠時切朕念每思爾等效力年久戰伐多功雖在寤寐未之有斁兹念爾等久不來見恐有誠意不得上通故特遣官齎敕賜爾等縀匹以諭朕意嗣後有欲奏聞之事即行奏請朕無不體恤行之朕方欲致天下於太平爾等心懷忠直母忘太祖太宗厯年恩寵我國家世世為天子爾等亦世世為王公享富貴於無窮垂芳名於不朽豈不休乎順治十四年丁酉三月丁卯定逺大將軍世子濟度班師還京時世子濟度父和碩鄭親王母福金弟多羅敏郡王及世子福金俱已相繼薨逝及至上命議政大臣等迎於盧溝橋告之世子隨詣靈柩前哭泣盡哀然後還府上親臨其第濟度率官屬出迎上望見惻然墮淚稍前上降輿執其手慟甚侍臣無不揮涕上謂濟度曰朕來初欲解慰及見爾慟不能已爾尚勉聽朕言少節悲哀為國自愛遂手賜茶酒復賜諸貝子公大臣茶畢還宫諭羣臣順治九年壬辰十二月丁卯上宴內大臣大學士尚書侍衛於中和殿賜大學士洪承疇陳名夏陳之遴尚書髙爾儼胡世安金之俊李化熙張鳳翔貂鑲朝服各一襲諭曰爾等皆朕倚任大臣若能潔已奉公屬員自當效法倘貪黷相尚必致顛倒是非不但公論不容抑且國法難宥爾等其思之順治十年癸巳三月戊辰上幸南臺召三院大學士學士翰林官六部尚書都察院左都御史從賜宴上持弓顧謂諸臣曰我朝戡定天下皆弓矢之力也曩者每嵗出獵練習騎射今朕躬親政事天下至大機務至繁一應章奏皆朕親為裁決日無暇晷身雖無暇心常念兹不忘也諸臣奏曰皇上此言誠欲措天下於太平居安思危真海內之福臣等願皇上始終存此念耳上曰卿等恐朕志不堅有違此言朕將自堅厥志卿等皆國之大臣亦當堅心輔朕務使天下乂安有備無患其諭大小臣工勉體朕懷順治十二年乙未正月戊戌上諭諸王大臣等曰昔皇考上賔朕方六歲正在幼沖當時諸王大臣同心推戴嗣紹丕基及定鼎京師奄有四海於時睿王攝政朕惟拱手以承祭祀凡兵民之疾苦原未周知自朕親政以來五年於兹焦心勞思以求化理夙夜祗懼不敢荒寧日望諸王大臣以嘉謨嘉猷入告匡救其失而輔其不逮乃疆圉未靖水旱頻仍吏治惰汙民生憔悴錢糧侵缺兵食不充教化未孚紀綱不立保邦致治之道迄今未得其要領朕思諸王大臣皆親見太祖太宗創業垂統之艱難年來闢地綏民之不易必有長策以裨治安而未見有直言得失者豈朕聽之不聰而虛懷納諌有未盡歟何相率而默默也以天下之大幾務之繁責於一人而弗圖勵翼朕雖凉德獨不念太祖太宗培養之恩乎揆厥存心或以為奉命議事祗宜將順而行否則緘口容身可保冨貴試熟思之天下未平富貴能長保乎以後凡養兵愛民興利除害有關政治者居則深思進則敷奏各抒忠藎以慰朕懷至於當事諸臣因循積弊僅以簿書為務不肯精思職掌擔大事發正言以圖實濟國計民生將何賴焉內外大小各官專為身謀罔念官守容容充位望缺希遷祿秩是營恩怨不化真心為國殆鮮其人前御史吳達謂滿朝大小各官盡皆臃腫朕以為出言太過由今觀之似不誣矣兹復開誠切諭務痛加省改有官守者必盡其職有言責者必盡其言弼德塞違期臻郅治君臣上下俱有令聞豈不美哉順治十三年丙申閏五月丁丑宣大總督張懸錫陛辭上諭曰卿到地方必勤慎供職毋使天下謂朕無知人之明此即卿之所以報朕也賜春夏衣各一襲又諭曰卿服此衣如侍朕左右當勉盡厥職復賜鞍馬一匹求言順治十年癸巳正月辛未上諭內三院曰近來言官條奏多係細務未見有規切朕躬者朕一日萬幾豈無未合天意未順人心之事良由諸臣畏憚忌諱不敢進諌耳朕雖不德於古帝王納言容直每懷欣慕朕躬如有過失諸臣須直諫無隱即偶有未合不妨再三開陳庶得省改力行正道希臻治平進言切當者必加旌奬言之過戇者亦不譴責爾等即𫝊諭大小諸臣俾咸悉朕意七月辛亥上諭內三院曰朝廷設立言官原為繩愆糾繆事關朕躬尚許直言無隱况諸司過失理當糾舉其言果當宜虛心靜聽即言有未當止宜分晰事理聽候朕裁豈容私逞報復近見科臣言事該部回奏輒援引律文欲以箝制言官自匿已非若如此是使人不敢指摘任意所為而上無由知殊負朕任人求治之心向來未經申飭不諳規矩姑不深究以後斷宜切戒至言官論事亦須明白確指不得托拾風影挾私妄訐著通行嚴飭順治十一年甲午二月丙寅上諭臺省諸臣曰朕惟言官耳目之司每期直言無隱欲聞天下之邪正貪亷大利大害以便發政施令立致太平故從前屢下明㫖屬望至切孰意重違朕心納交結黨或有身被人言倩人報復者或有狥護同黨代為報復者以故多有明知其惡畏其同黨而不敢言每閲章奏實心為國者少附黨行私者多朕圖治方殷豈容比匪成姦但念秋霜肅殺莫若陽春化育嗣後須各滌肺肝捐舊圖新實心為國凡天下邪正貪亷大利大害直言不諱則政理新而太平可臻爾等身家名譽亦與之俱永矣三月戊申上諭臺省諸臣曰陳名夏姦惡爾等明知向來懼怯不言已屬溺職及面加詰責皆云雖有風聞未得實據朕在深宫尚且洞悉爾等職司耳目何得懵無見聞明係知而不言相率欺蔽人臣為國為君忠愛之道豈宜如此今陳名夏已經正法爾等薄加降罰聊示懲戒嗣後務宜痛改前過從善去邪知無不言言無不實庶使憸壬屛跡中外肅清副朕求言圖治之意癸丑上諭吏部曰太祖太宗創業開基收服諸國朕入關討賊除暴救民平定中原統一四海悉賴滿洲兵力建功最多勞苦實甚乃産薄差繁凡有征行馬匹器械衣甲餱糧無不自備效力彌勤資生無䇿深可軫念十年以來章奏雖多未見言及於此者近覽科臣林起龍所奏思慮周詳條畫有緒實心為國忠誠可嘉嗣後凡事關政治得失民生休戚大利大害應興應革切實可行者言官俱宜悉心條奏直陳無隱如果為國抒誠有裨政事朕不靳懋賞爾部即行𫝊諭四月癸酉上諭都察院科道諸臣曰朕覽近日言官糾參章疏率皆牽連陳名夏或曰名夏親戚或曰名夏黨與似此紛紜舉朝幾無善類矣爾等言官既有真見何不言於名夏未發覺之前乃因其已經正法輒吹求無已成何政體殊非朕虛懷納牖之意嗣後論人論事須指實直言不得再借名夏親戚黨與具奏違者治罪順治十二年乙未正月甲辰上諭吏部都察院及科道諸臣曰三年以來水旱相仍干戈未息饑饉人民轉徙溝壑滿洲兵士困苦無聊災變未弭時艱莫救其故安在意者朕躬有闕用人不當行政失宜以致是歟抑諸王貝勒大臣或有勵翼未盡而然歟前曽有㫖命言官直陳時事無論當否槩豫優容後乃分别是非間有譴謫致生疑畏之心章奏敷陳未免瞻顧兵民疾苦不得上聞今廣開言路博詢化理凡事關朕躬者何令不信何政未修諸王貝勒辦事諸臣曠職之愆叢弊之處及內外各司何害未除何利未興各據見聞極言無隱須詳明切實庶便覽觀一切啓迪朕躬匡弼國政者所言果是即與採用如有未當必不加罪順治十七年庚子五月己卯上諭吏部等衙門曰朕統御寰區焦心圖治前此屢有引咎省躬詔諭自今追思皆屬具文虛邀名譽於政事未有實益且十二十三年間時有過舉經言官指陳有即加處分者有優容寬宥而此心介介尚未全釋者事有錯誤猶可改圖居心未淨政事之流弊必多今上天示警亢旱癘疫災眚迭見寇盜未寧民生困瘁用是痛加克責實行省改向因建言得罪流徙降革等官吏部詳察職名事蹟開列具奏目今政務關係國計民生利害所在急當興革者爾部院等衙門各據實條奏科道各官尤當盡言無隱即朕躬闕失亦直言勿諱朕不惟不加罪併不芥蒂於心共圗挽回天意早躋升平納諌順治九年壬辰九月戊戌大學士洪承疇陳之遴奏言臣等閲欽天監奏云太白星與日爭光流星入紫微宫竊思日者人君之象太白敢於爭明紫微宫者人君之位流星敢於突入上天垂象誠宜警惕且今年南北旱潦歲饑寇警處處入告宗社重大非聖躬逺幸之時達賴喇嘛逺來遣一大臣迎之足矣何勞聖駕親往為也天道深逺固非臣等所能測度但乘輿將駕而星變適彰此誠上蒼仁愛陛下之意不可不深思而省戒也疏入上諭承疇等曰卿等所諌甚是朕即停止以卿等賢能故擢贊密勿嗣後國家一切機務及百姓疾苦之處如何始合民心如何不合民心卿等有所見聞即詳明敷陳勿得隱諱朕生長深宫無由洞悉民隱凡有所奏可行即行縱不可行朕亦不爾責也順治十年癸巳七月戊戌和碩鄭親王等以今年雨潦異常奏請暫停宫殿工程以錢糧賑濟軍民上曰王等所奏甚是宫殿及各項工桯俱令停止以休養軍民各處田地速行踏勘賑濟事宜勿得延緩自王以下至各官凡祭祀飲食槩宜從儉朕亦自圗節省任官順治八年辛卯閏二月丙辰上諭吏部曰邇來吏治敝壞不肖者朘削民財營求升轉不恤地方荒殘民生疾苦稍知自愛愛民者因上官舉薦不公不覺操守頓易至於不識文義之人益不勝任文移招詳全憑幕友代筆轉換上下與吏役通同作弊貽害百姓督撫不行糾參大乖法紀嗣後應嚴行甄别有德有才兼通文義者著保奏其不識文字聽信吏役害民者立行參劾不得姑留地方如督撫徇情隱蔽不行糾參即為溺職事發一併治罪至於銓選之時爾部考試文移告示等項優者選用劣者除名澄清吏治大端在此內外各官著遵諭實力舉行順治十年癸巳三月己巳上諭內三院曰朕稽往制每科考選庶吉士入館讀書厯升編檢講讀及學士等官不與外任所以咨求典故撰擬文章充是選者清華寵異過於常員然必品行端方文章卓越方為稱職乃者翰林官不下百員其中通經學古與未嘗學問者朕何由知今將親加考試先閲其文繼觀其品再考其存心持已之實據務求真學備朕異日顧問自吏禮兩部翰林侍郎及三院學士詹事府詹事以下各候朕㫖親試分别髙下以昭朕慎重詞臣之意四月庚子上諭吏部曰國家官人內外互用在內者習知紀綱法度則內可外在外者諳練土俗民情則外亦可內內外揚厯方見真才朕親試詞臣量為分别有照舊留任者有改授外任者其外任編檢以上官照詞臣外轉舊例優與司道等缺如年衰病弱者聼其請告朕仍優遣之順治十二年乙未九月辛卯上諭吏部曰國家官人原當內外互用以勵羣材近見外官內轉京官外任者多能稱職宜再行互用除翰林官員朕自裁定其六部卿寺等官有才優經濟堪任養民者著各堂官開列六科官員著吏科開列各道御史著都察院開列通送吏部㑹同都察院察核速奏其在外司道等官品行著聞政治卓越者確察實蹟遇缺內轉務使內外得人職事修舉以副朕圖治安民至意己亥上諭吏部曰翰林官員簡擢中祕習知法度今用人孔亟必得文行兼優者以學問為經濟庶能飭法惠民助登上理兹朕親行裁定陳爌等十八人皆品行清端才猷贍裕信任既久圖報必殷著各照外轉應得職銜升一級用遇缺即補各官須益矢忠勤興利除弊副朕圖治安民至意順治十三年丙申六月乙未陜西總督馬之先陛辭上諭曰以爾素望堪任斯職故行特簡爾受事後務實心供職興利除害陜西乃天下咽喉要地爾須較前任孟喬芳倍加勤慎方克有濟毋使天下謂朕不知人也爾其勉之大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷二
