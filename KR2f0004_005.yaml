body:
  text: 欽定四庫全書大清世祖體天隆運定統建極英睿欽文顯武大徳𢎞功至仁純孝章皇帝聖訓卷五興文教順治九年壬辰九月辛卯上視學癸巳賜衍聖公及五經博士四氏子孫祭酒司業學官等袍㡌監生銀兩乂賜敇勉勵師生敕曰聖人之道如日中天上賴之以致治下習之以事君爾等務盡心教訓諸生諸生亦當祗承師訓力體諸身教成為師訓之功學成乃弟子之職儻訓誨不嚴服習有怠爾師生俱不能辭其責勉之順治十年癸巳四月甲寅上諭禮部曰國家崇儒重道各地方設立學宫令士子讀書各治一經選為生員登之黌序朝廷復其身有司接以禮培養教化貢明經舉孝亷成進士何其重也朕臨御以来各提學官每令部院考試而後用之誠重視此生員也比聞有不通文義微賤之屬濫厠學宫甚至出入衙門交結官府侵占地土武斷鄉曲國家養賢之地竟為此輩藏垢納汚之所又提學官未出都門即受囑託既到地方曲徇情面賄賂公行督學之門竟成商賈以致白丁豪富冒濫衣巾孤寒宿學艱於上進深可痛恨今後督學諸臣皆宜更新惕勵嚴察冒濫及文理荒謬者俱行降黜其入學生員仍令各學敎官月加課程不得曠廢亦不得借端凌虐嵗科試卷解部稽察爾部照例考定等第以示勸懲各學臣誠能體朕教養儲才之心實力遵行自使士風丕變人材輩出國家治平實嘉賴之順治十二年乙未正月丙午御製資政要覽親為序曰朕惟帝王為政賢哲修身莫不本於徳而成於學如大匠以規矩而定方圎樂師以六律而正五音凡古人嘉言善行載於典籍者皆修已治人之方可施於今者也朕孜孜圖治學于古訓覽四書五經通鑑等編得其梗概推之十三經二十一史及諸子之不悖於聖經者莫不藴涵事理成一家言但卷帙浩繁若以之教人恐未能一時盡解其義亦未能一時盡得其書因思夫記事宜提其要纂言當鉤其元乃採集諸書中之闗扵政事者為三十篇又慮其渙而無統於是每篇貫以大義聯其文辭於忠臣孝子賢人亷吏畧舉事迹其姦貪不肖悖亂者亦載其内使法戒炯然加之訓詁詳其證據譬之萃衆白以為裘範六金而成鼎㫖約而易明文簡而易閱名曰資政要覽觀是書者熟思而體之可以為篤行之善人推𩔖而廣之可以為明理之君子毋徒求之語言文字之間則朕諄諄教諭之心庶乎其不虗矣庚戌御製勸善要言成親為序曰朕惟天道至善即以其善賦之下民故人之生無有不善其或有不善者皆因内蔽於私欲外染於汚習遂失其繼善成性之本體而日逺於天矣因人之存心行事不同是以上天鑒察降以災祥其降祥者固以顯佑善人其不得已而降災者亦以明戒下民使之改過而遷於善也從来報應昭昭不爽詎不可畏哉古人原天垂訓以教天下正論嘉言不一而足但文之深者或不易通言之簡者又不能盡朕恭承天命撫育萬方深念上之教世勸善為先人之立身為善最樂故取諸書之要者輯為一編名曰勸善要言語不欲文期於明理詞不厭詳期扵曉衆欲使賢愚同喻小大共知讀此書者當深思其義反之於心體之於身善者則益當加勉而進於淳良以求吉慶其或無知而誤染於不善者尤當速改而歸於無過以免災戾庶㡬不負上天好生之心而朕殷殷教化之意亦不虗矣凡我人民其敬勉之哉三月壬子上諭禮部曰朕惟帝王敷治文教是先臣子致君經術為本自明季擾亂日尋干戈學問之道闕焉未講今天下漸定朕將興文教崇經術以開太平爾部即𫝊諭直省學臣訓督士子凡六經諸史有闗於道徳經濟者必務研求通貫明體達用處則為真儒出則為循吏果有此等實學朕當不次簡㧞重加任用又念先賢之訓仕優則學仍傳諭内外大小各官政事之暇亦須留心學問俾徳業日修識見益廣佐朕右文之治順治十四年丁酉十月丁亥上諭工部曰文廟崇祀先師孔子所闗典禮甚重今已年乆傾圯若不速為整理後漸頹壞葺治愈難因爾部錢糧匱乏所需工料未能措辦朕發内帑銀三萬兩特加修葺爾部即𫝊諭行諭將帥順治十五年戊戌八月丙子上遣官魏黒等齎敇往諭安逺靖寇大將軍多羅信郡王多尼寧南靖㓂大將軍固山額真宗室羅託征南將軍固山額真卓布特進兵機宜復諭魏黑等曰爾等至彼可集王貝勒等諭以撫循士卒當如父之愛子行軍必敬慎隄防謀事無失毋得驕矜躁急致有疎虞夫士在行間固當有進無退而克敵制勝尤貴懼以成謀前敬謹親王及訥爾特等之敗皆以輕敵躁進故也至投誠之人當分别其傾心效順或事急來降即事急來降者亦當收養縱有逃亡聽其自去始足彰我恩育之仁夫以威服人何如以徳服人之為愈邪招降順治十三年丙申六月癸巳上諭江南浙江福建廣東督撫鎮各官曰朕惟自古帝王底定萬邦皆恩威並用討貳懐服乃能使人心樂於歸往蚤致太平本朝開創之初遐方尚在疑畏竄附海逆鄭成功者實繁有徒或嘯聚有年未經歸化或被賊迫脅反正無由或偶䧟賊中力難自拔原其本念未必甘心從逆也朕念若輩皆我赤子迷罔無知深可憫惻今欲大開生路許其自新該督撫鎮即廣出榜文曉諭如能誨過投誠者破格陞擢以計擒斬賊渠來獻者首功封以髙爵次者亦予世職同來有功人等顯官原賞朕所不恡倘執迷不悟鄭逆所據不過海濱窮島耳一旦絶其糧饟阻其出沒遣發王師直搗巢穴必至玉石俱焚雖悔亦何及乎其前此陷賊官民及新附人等該地方官盡心安挿務令得所諭外藩順治十三年丙申八月壬辰上諭厄魯特部落巴圖魯台吉土謝圖巴圖魯戴青等曰分疆别界各有定制是以上不凌下下不侵上古帝王統御之常經也朕懐撫恤逺人之意正欲共躋斯世於隆平迺數年來爾等頻犯内地劫奪馬牛拒敵官兵率領畨夷威脅搶掠督撫按屢經奏報即行遣官曉諭爾終不悛朕體天地好生之心宥兹小過今特遣侍郎石圖啟心郎鼐格前往訊理如劫奪是實即當按數賠償倘地方官誣誑罪有所歸非爾等之咎畨夷在明時屬蒙古納貢者即歸蒙古如為明所屬者應隸中國為民與䝉古又何與焉其漢人䝉古所定居址與夫貿易隘口詳為察核仍舊分定耕牧毋得越境混擾庶副朕撫綏之心而爾等亦永享其休矣甲辰荷蘭國貢使歸國上賜其國王銀幣仍降敕諭曰爾國僻在西陲海洋險逺厯代以来聲教不及乃能緬懐徳化效慕尊親擇爾貢使赴闕来朝䖍修職貢地逾萬里懐忠抱義朕甚嘉之用是優加錫賚以報孚忱至所請朝貢出入貿易有無雖灌輸貨貝利益商民但念道里悠長風波險阻舟車跋渉閱厯星霜勞勩可憫若貢期頻數猥煩多人朕皆不忍著八年一次來朝所攜貨物在舘貿易不得於廣東海上私行貨賣爾其體朕懐保之仁恪恭藩服慎乃常職祇承寵命仁政順治八年辛夘閏二月乙夘上諭吏部曰𣙜闗之設國家藉以通商非以困商闗稅原有定額差一司官己足何故濫差多人每官一出必市馬匹招書役未出都門先行納賄户部又填給糧單沿途騷擾包攬經紀任意需索量船盤貨假公行私沿河一帶無異劫奪商賈恐懼不前百物騰貴河道天下通行之路何以至此朕灼知商民之苦著仍舊每闗設官一員其添設者悉行裁去以後不得濫差丙寅上諭兵部曰國家設立驛遞原以傳朝廷之命令通天下之脈絡年來四方多故兵馬絡繹差遣繁多驛遞疲困至今日已極乃奉差官員全不知地方苦楚勘合火牌之外恣意苛索驛夫不足派及民夫騷動里甲甚而牽縶婦女繫累生儒鞭驛官如罪犯辱州縣等奴隸以致夫逃馬倒罷市止耕上誤公務下害小民深可痛恨嗣後有蹈前轍者不拘大小衙門令地方官即指名申報督撫飛章㕘奏以憑重處其地方官驗明勘合火牌亦即照數應付毋得稽遲取罪如本無遲誤情幣該差員役因需索不遂駕言遲誤反卸罪州縣者督撫一併查㕘治罪丁丑上諭兵部曰前者青州故明玉田王之子聚衆祭旗恣行不軌又陜西叛將王元馬徳戕殺撫臣議扶慶王之孫招摇惑衆因而明之各王多被誅戮朕甚憫焉今朕親理萬㡬代天子民務期四海萬姓咸得其所豈獨明之子姓不在涵育之中乎嗣後直省有故明親王郡王流落地方者該督撫察其投誠始末有無功次併其家口起送來京分别畜養其自鎮國將軍以下不必起送各照原籍編氓樂業三月乙酉上諭户部都察院曰朕覽巡鹽御史崔允𢎞章奏因思各處奏報鹽課常有餘銀細思鹽課正額自應徴解若課外餘銀非多取諸商人即係侵剋百姓大屬弊政爾部院通行各差御史及各鹽運司止許徴解額課不許分外勒索餘銀有御史及運司各官貪縱者許商民首告審確奏聞治罪用布朝廷恤商裕民至意順治十二年乙未八月癸酉上諭工部曰畿輔之地乃天下根本必加意安養使民生樂業方能自近及逺漸致太平前爾部㑹同戸禮兵三部覆奏修築運河決口議將直隸八府州縣節年所欠各部寺錢糧速行催解以濟修河急用朕念畿内地方人民艱苦房地屢經圈撥水旱連嵗相仍既缺養贍之資俱有身家之累而厯年積欠一旦並徴其何以堪殊非加惠近畿篤厚根本之意朕心深為不忍爾部仍㑹同各部將修築決口應另用何項錢糧悉心籌畫確議速奏其直隸八府州縣順治八年至十一年未完錢糧實欠在民者悉與蠲免體羣情順治十三年丙申六月己丑上諭八旗各牛录曰朕念滿洲官民人等攻戰勤勞佐成大業其家中役使之人皆獲自艱辛加之收養誼無可去乃十餘年間或戀親戚或被誘引背逃甚衆隠匿滋多故特立法嚴禁然以一人之逋逃而株連數家以無知之奴僕而累及職官立法如此其嚴者皆念爾等數十年之勞苦萬不得已而設非朕本懐也爾等亦當思家人何以輕去必非無因果能平日周其衣食節其勞苦彼且感恩效力豈有思逃之理若全不體恤雖嚴法防禁終難止其逃何益之有朕為萬國之主念兹犯法諸人孰非天生蒸民孰非朝廷赤子儻刑罰日繁戸口日減爾等亦何能自安今後務各仰體朕意覺悟省改大清世祖體天隆運定統建極英睿欽文顯武大徳𢎞功至仁純孝章皇帝聖訓卷五
