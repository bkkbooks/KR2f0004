body:
  text: 欽定四庫全書世祖章皇帝聖訓序朕惟自古膺圖御厯之后躬集大統手致太平懋烈豐功光前翼後行之為政斯發之為言義蘊固卓越乎百王訓行尤昭示乎奕祀惟聖有作後人述焉千載同揆也我皇考世祖體天隆運英睿欽文大德𢎞功至仁純孝章皇帝神靈首出智勇天授秉英斷之姿而持以恭儉擴寬仁之量而濟以憂勤爰是沖齡定鼎薄海歸心救生民於水火之中而庶政咸熙萬邦作乂德盛勳崇敻哉莫尚矣若夫宵旰圖維宫庭訓敕煌煌綸綍嘉言孔彰究聖學之高深著王道之正直凡所以凝天命揚祖德顧民巖持國體者叮嚀反覆深切著明而意旨所注尤殷殷乎省躬克已納誨親賢綱紀畢張淵𠂻若歉及乎訓誡臣下守正奉公鼓勵激揚至誠感發靡不輸服而效忠黽勉而奮績也蓋自我太祖髙皇帝肇造鴻基太宗文皇帝式廓駿業而我皇考心傳合一丕顯丕承𢎞闡經猷布為政教所以即事成謨遇物為誥包羅典册釐剔章程美善畢臻巨細咸備堯咨舜警何以加兹朕祗承遺緒惕厲靡寧瞻方䇿之常新僾羹墻之如覩因命儒臣分類編纂朕復詳加披繹計一百一十三條統為聖訓六卷寶諸金匱拱若球圖俾後嗣子孫知我皇考之貽謀燕翼百世無疆開國經綸萬年時敘所以杜愆忘而遵典則者心法於是乎在書曰紹聞衣德言詩曰紹庭上下陟降厥家嗚呼可不敬哉康熙二十六年三月二十七日世祖章皇帝聖訓序古昔帝王應運而興開物成務有君天下之規模凝命敕幾有師天下之典則故言出而成經教思所被率土歸仁厯觀往代紀載肇乎二典彞倫敘於九疇罔不播為成憲炳如日星簡籍具存可考而知也欽惟我世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝秉岐嶷首出之資建永清大定之業沖齡踐阼統一車書義問達乎梯航仁聲遍於塗巷盛德大業富有日新自唐虞三代以來史册所傳罕有及者至若洋洋聖謨包涵萬有大之關倫教綱常之重而閭閻之日用飲食所弗遺精之在身心性命之微而宫府之制度典章所必飭巨細畢該綱維盡善要惟本精一執中之奧藴以成經世服物之鴻謨誕告多方嚴明愷摯訓敇有位深切周詳意皆出乎至誠理尤協於克一用以光大前徽開萬年有道之長敻乎與天地為昭矣我聖祖仁皇帝躬承先訓命儒臣分類編輯計一百一十有三條彚成聖訓六卷以傳久逺我皇考念切紹衣宫庭宵旰追述先猷朕從溫凊之時聞知維謹嗣膺大統志在覲揚朝夕披陳具見開國經綸超越前古詒謀燕翼垂裕無窮是用敬為剞刻昭示臣民俾海隅出日之逺咸覩光華寶之如圖球信之如蓍蔡是訓是行欽承勿替庶幾道德一而風俗同唐之政要宋之寶訓夫豈可同年而語者哉謹序乾隆四年十二月初十日欽定四庫全書史部六大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓目録詔令奏議類詔令之屬卷一論治道敬天聖孝聖學謙德節儉警戒卷二敦睦諭羣臣求言納諌任官卷三考績選舉誡飭臣下卷四理財恤民賑濟重祀典禮前代褒忠節卷五興文教諭將帥招降諭外藩仁政體羣情卷六安民慎刑懲貪佞除弊宥過臣等謹案世祖章皇帝聖訓六卷康熙二十六年聖祖仁皇帝恭編凡一百一十三則分三十有二門乾隆四年皇上御製序文刋布洪惟我世祖章皇帝夙齡踐阼定鼎燕京視帝堯起自唐封尚先五載然生而神靈幼而徇齊長而敦敏則比德于黃軒是以提挈天樞驅䇿羣力削平三蘖底定四瀛大同文軌建億載之丕基加以宵旰之餘始終典學御注孝經則操至德要道之原御纂內則衍義則昭篤近舉逺之本御製人臣警心録則振舉政典澄敘官方御撰資政要覽則敦敘綱常砥礪世教凡聖賢之理藴無不闡明凡帝王之治法無不講貫固己本心出治舉措咸宜即教闡聖謨言為世則亦出同綸綍寶並球圖夫天不可測測以星辰之行地不可度度以山川之紀聖不可知知以典籍之所傳堯誡湯銘貽留奕祀亦庶幾稍窺髙厚之萬一矣乾隆四十八年八月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀
