body:
  text: 欽定四庫全書大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷四理財順治十年癸巳四月甲寅上諭戶部曰比年以來軍興未息催徴煩急兼以水旱頻仍深慮小民失所民間充解物料款項煩多以致僉點解戶賠纍難堪向曽量折幾項但折少解多民不沾惠爾部速查有應解本色易於買辦者永逺改折前代一條鞭法總收分解責成有司小民便於輸納不致擾害國家亦收實課不致缺用立法良善見行條鞭地方令官收官解不得仍派小民順治十四年丁酉十月丙子上諭戶部曰朕惟帝王臨御天下必以國計民生為首務故禹貢則壤定賦周官體國經野法至備也眀初取民有制休養生息至萬厯年間海內殷富家給人足及天啓崇禎之世因兵增餉加派繁興貪吏緣以為姦民不堪命國祚隨之良足深鑒朕荷上天付託之重為生民主一夫不獲亦疚朕懷凡服御膳羞深自約損然而上帝宗廟百神之祀軍旅燕饗犒錫之繁以及百官庶役餼廪之給罔不取之民間誠恐有司額外加派豪蠹侵漁中飽民生先困國計何資兹特命爾部右侍郎王𢎞祚將直省每年額定徴收起存實數編撰成帙詳稽往牘參酌時宜凡有參差遺漏悉行駁正錢糧則例俱照眀萬厯年間其天啓崇禎時加增盡行蠲免綱舉目張彚成一編名曰賦役全書頒布天下庶使小民遵兹令式便於輸將官吏奉此章程罔敢苛斂為一代之良法垂萬世之成規然此其大略也若夫催科之中寓以撫字廣招徠之法杜欺隱之姦則守令之責也正已率屬承流宣化核出納之數慎那移之防則布政司之責也舉亷懲貪興利除害課殿最于荒墾昭激揚於完欠恪遵成法以無負朕足國裕民之意則督撫之責有特重焉其敬承之毋忽恤民順治八年辛卯二月丙午上諭户部諸臣曰田野小民全賴地土養生朕聞各處圈占民地以備畋獵往來下營之所夫畋獵原為講習武事古人不廢然恐妨民事必於農隙今乃奪其耕耨之區斷其衣食之路民生何以得遂朕心大為不忍爾部速令地方官將前圈地土盡數退還原主令其乘時耕種七月丙子上諭戶部曰數年以來投充漢人生事害民民不能堪甚至有為盜窩盜者朕聞之不勝痛恨帝王以天下為家豈有厚視投充薄待編氓之理况供我賦役者民也國家元氣賴之投充者奴隸也今反藐視有司辨髦國法欺壓小民若不大加懲治成何法紀嗣後投充之人若仍前生事害民本主及該管官知情連坐除本犯正法外妻孥家産盡行入官從前有司責治投充之人曾有革職問罪者以致投充之人益加橫肆今後各該地方官如遇投充之人犯罪與屬民一體從公究治順治九年壬辰九月甲申戶部奏稱朝鮮解送商人二十八人并貨物至臣等細訊係明末往日本貿易回時遇風飄至朝鮮非本朝私行飄海者上曰朝鮮送來二十八人皆係朕之赤子漂流外國殊可憫念著發回原籍其原貨俱令本人領去順治十一年甲午四月己卯上幸南苑見郊外農民耕耘不輟聖心豫恱顧謂侍臣曰去年旱潦為災小民甚苦今如此辛勤待秋成後自獲享有年之樂矣命內大臣巴哈等賞農夫一百八十餘人銀兩順治十二年乙未正月甲辰上諭戶部曰朕有天下皆我太祖太宗積德施仁開創鴻緒以貽藐躬朕既為生民主一夫不獲時廑朕衷念自明運式微流賊煽亂朕奉天成命救民於水火之中率土人民如依父母以為必蒙愛育得享升平豈意比年以來水旱頻仍干戈未靖轉輸旁午人不聊生蕩析離居鬻及妻子煢煢無告輾轉呼號想其怨咨必歸於朕言念及此何以仰副祖宗付託之意中夜以興澘焉出涕雖未能減賦蠲租實欲除苛去甚與良有司共圖休養已有諭旨令內外大小官員悉心條奏通達下情嗣後各地方錢糧凡橫斂私徴暗加火耗荒田逃戶灑派包賠非時預徴蠲免不實災傷遲報踏勘騷擾妄興詞訟妨奪農時等弊一切嚴行禁革有違犯者該督撫即行糾參治罪如督撫徇縱部院科道官訪實劾奏順治十四年丁酉七月戊申上諭禮部曰時方入秋田禾在野必雨暘時若乃望西成今霖潦未休傷稼可慮干和召沴定有由來朕夙夜祗懼循省愆尤大小臣工亦俱宜洗心滌慮協圖修省以格天心仍遣官於圜丘虔禱晴霽順治十七年庚子六月壬辰上諭禮部曰今夏亢陽口久農事堪憂朕念致災有由痛自刻責榖為民天非雨不遂竭誠祈禱積有日時乃精誠未達雨澤尚稽晝夜焦心不遑啓處兹卜是月之十三日豫行齋戒黎明步至南郊是夜子刻祭告圜丘祈禱甘雨以拯災黎若仍不雨則再行躬禱務回天意賑濟順治十一年甲午二月甲申上諭戶部等衙門曰朕念比年兵事未息供億孔殷加以水旱頻仍小民艱食地方官不加撫綏以致流離載道夫普天率土擊命朕躬而困苦如斯何忍聞見朕為之寢食不遑拯濟安全時不容緩戶部等衙門凡有錢糧職掌者即將見今貯庫銀兩實在數目作速查明奏聞丙戌上諭戶部曰四海蒼生皆朕赤子飢寒轉徙深切痌瘝前各督撫疏奏災荒等處已經查照分數酌量蠲免各府州縣衛所等官務在實力奉行不得混徴徒飽貪腹極荒地方非蠲免所能救者該督撫速行查奏另加恩恤至於畿輔重地房屋田土多經圈占加以去年水荒特甚尤為困苦朕夙夜焦思寢食弗寧亟宜拯救庶望生全但荒政未修倉廪無備若非頒發內帑何以濟此急需兹特發庫貯銀十六萬兩聖母皇太后發宫中節省銀四萬兩朕又發御前節省銀四萬兩遣滿漢大臣分赴八府地方賑濟督同府州縣衛所各官量口給散務使飢民均霑實惠順治十三年丙申八月丁酉上諭戶部曰順天府屬係京畿根本重地年來水旱頻仍小民失業生計蕭條較他處為獨苦今歲復霖雨飛蝗相繼為災己蒙皇太后發帑賑濟朕因念被災窮黎救死不贍若以國賦亟需責之照舊輸納轉徙溝壑勢必難免恐非所以仰宣皇太后特施拯恤之德意爾部速將順天府屬各州縣災傷分數察勘明白分别重輕酌量蠲免以昭嘉惠元元至意順治十六年己亥五月辛上諭戶兵二部曰雲貴新入版圖百姓皆朕赤子念十餘年來逆冦李定國等竊踞南服民久在水火之中困於誅求生計日匱疾痛莫告今大兵所至羣黎歸命歡若更生但聞兩省地方生理未復室廬殘毁田畝荒蕪俯仰無資衣食艱窘朕每念及不勝憫惻至南征大兵閲厯險阻長驅深入糧餉恐有時不繼今特發內帑銀三十萬兩爾部即遣官刻期齎往經略軍前以十五萬兩賑濟兩省窮民其十五萬兩令經略臣收貯見今進討三路大兵如有需餉甚急者立行接濟重祀典順治十三年丙申十二月己亥上諭禮部曰古來聖帝眀王皆有大功德於民者是以纍代相因崇祀不替今厯代帝王廟祭典雖已修舉但十三年來俱遣官致祭朕欲於明春親詣行禮以抒景仰前徽至意爾部其具儀以聞順治十四年丁酉二月戊寅上諭禮部曰禮莫重於事天孝莫大於尊親朕纘承鴻緒恪修祀典每嵗郊祀皆奉太祖髙皇帝配享今思太祖受命上天肇興帝業太宗繼志述事丕振皇猷功德並隆咸宜崇祀嗣後二至祈榖俱奉太宗同太祖配享著為定制順治十五年戊戌正月辛亥上祈榖於上帝禮畢還宫諭大學士額色黑學士折庫納曰凡祭祀儀物音樂必盡善盡美始克展敬心今觀太常所奏樂聲容儀節俱未諧和夫樂乃祭祀之大典必聲容儀節盡合歌章始臻美善其召太常嚴飭之令勤加肄習毋致違忽禮前代順治八年辛卯六月辛未上諭禮部曰順治元年定守明朝諸帝陵寢並祭典因神宗與我朝有嫌故裁之朕思前朝帝王陵寢理宜防護況我朝凡事俱從寬厚今神宗陵著照故明十二陵例以時致祭仍設太監陵戶看守順治十四年丁酉二月甲申上諭工部曰朕念故明崇禎帝尚為孜孜求治之主祗以任用非人卒致寇亂身殉社稷若不亟為闡揚恐千載之下竟與失德亡國者同類並觀朕用是特製碑文以昭憫惻爾部即遵諭勒碑立崇禎帝陵前以垂不朽六月己丑立金太祖世宗陵碑御製文曰朕惟自古膺圖受籙咸有大功德於天下及其殁也弓劍之藏後世重焉匪特陰陽之所景貺實亦遐邇之所繹思故時代雖遙崇禮不替若聲教被於當年園寢湮於異世非所以昭德追逺也朕撫有寰區於前代陵墓未嘗不惓惓於心申飭所在守護維謹惟金代之陵在房山者前我師克取遼東故明惑於形家之説疑與本朝王氣相關遂劚斷其地脈己巳嵗我太宗文皇帝統師入關念金代先德遣王貝勒大臣詣致祭明復加摧毁且建立關帝廟為厭勝之術夫不逹天命之有歸而謬委靈於風水移災於林木何其誕也金代垂祚百有餘年英主哲辟實光史册乃易代之後兆域荒圮祀典缺廢撫今追昔慨焉興歎金太祖世宗已經崇祀帝王廟其陵寢命地方春秋虔祀外兹特諭禮臣專官省視修其頽毁俾規制如初併令有司時祭無斁嗚呼廟貌既崇特景思於往哲封塋重煥用昭示於來兹爰勒貞珉以垂不朽云爾順治十六年己亥十一月甲戌上諭工部曰前代陵寢神靈所棲理應嚴為防護朕巡幸畿輔道經昌平見明代諸陵殿宇牆垣傾圮已甚近陵樹木多被斫伐向來守護未周爾部即將殘毁諸處盡行修葺見存樹木永禁樵採添設陵戶令其小心看守責令昌平道官不時嚴加巡察爾部仍酌量每年或一次或二次差官察閲勿致疏虞甲申上諭禮部曰明崇禎帝勵精圖治十有七年不幸寇亂國亡身殉社稷考其生平無甚失德遘兹厄運殊堪矜憫宜加諡號以昭實行今諡為莊烈愍皇帝褒忠節順治九年壬辰十一月乙酉上諭禮部曰明末寇陷都城君死社稷當時文武諸臣中豈無一二殉君死難者幽忠難泯大節可風爾部詳訪確察死節職名併實迹具奏勿遺勿濫大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷四
