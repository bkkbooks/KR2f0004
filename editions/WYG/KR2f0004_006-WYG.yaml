body:
  text: 欽定四庫全書大清世祖體天隆運定統建極英睿欽文顯武大徳𢎞功至仁純孝章皇帝聖訓卷六安民順治八年辛卯閏二月丙寅上諭兵部曰朕思各處土㓂本皆吾民或為饑寒所迫或為貪酷官吏所驅年来屢經撲剿蕩平無期皆因管兵將領縱令所部殺良冒功因而利其婦女貪其財帛真賊未必剿殺良民先受荼毒朕甚痛之嗣後各該督撫所屬境内有賊寇依山伏莽嘯聚焚劫者即廣偵宻探責令領兵官星馳相機剿撫勿令滋蔓其附近賊巢居民不得借搜捕為名一概殺掠至從賊營逃出難民難婦及真賊革心投順即與訊明安置完聚如有零星賊黨竄伏村落者責成道將有司設法掩捕不得輕動大兵使玉石俱焚倘被人首告為賊者該地方官須詳審實情勿聽仇扳株累各督撫務嚴飭各該道將等官實力遵行稱朕除宼安民至意順治十年癸巳五月己卯上諭兵部曰天下初定瘡痍未起加之比年水早民不聊生饑寒切身迫為盜賊及官兵捕剿玉石難分魁惡雖多剪除株蔓豈無寃濫況當年沉䧟情事不同或見迫扵貪汚或逼脅於渠寇既為賊黨自拔無門念此人民皆朕赤子生聚最難摧殘極易若概加誅戮深可憫傷兹特降殊恩曲加赦宥自今順治十年五月二十五日以前凡有嘯聚山林劫掠道路曽為土賊者無論人數多寡罪犯大小但能真心改悔自首投誠悉赦前罪仍令所在官司酌量安挿兵仍補伍民即歸農不願還鄉者聽其随便居住不許將吏有司及讐怨之家挾制嚇詐告擾侵害其受撫人衆須痛改前非革心安業不許倚恃受撫名色欺壓良民倘或違犯定行追論順治十五年戊戌五月癸夘上諭兵部督捕衙門曰逃人事宜屢有諭㫖念滿漢人民皆朕赤子故令㑹議量情申法衷諸平允而年来逃人犯法者未止小民因而牽連被害者多近聞有姦徒假冒逃人詐害百姓或借名告假還家結連姦惡將殷實之家指為窩主或原非逃人冒稱旗下在外嚇詐羣黨指稱轉騙不已或有呈告督捕即買主冒認指詭名作真者或有聲言赴告在地方官處禀挐嚇騙良民者或告假探親肆行指詐及領本貿易假夥攀害種種詐偽甚多深為可惡今後凡有逃人本主即報明本固山額真等將逃人之主及逃人姓名具印結報部如逃後日久方報既獲逃人乃稱係伊家人者此人不許給主即令入官直省地方有旗下告假私出妄為及冒稱旗下羣姦横行者著該督撫嚴行訪拏解部查明倂本主從重治罪慎刑順治八年辛夘三月乙酉上諭刑部曰朕覽撫臣遲日益疏為原㕘荆州府推官劉祖生招罪内稱祖生病故已服㝠誅因思及天下之大罪囚之斃扵囹圄者不知凡㡬或死扵疾病或死扵饑餓或死扵刑拷甚至有死於官役之虐害囚徒之隂謀此𩔖未可悉數朕心為之惻然是在府州縣良有司濟以醫藥給以口糧非刑有禁凌虐有禁内外交通毒謀隂害有禁督撫巡按時時申飭道府親為清察州縣有犯前弊者分别㕘處庶獄囚之伏法而死者罪屬應得其餘不至無故而枉死用昭朝廷立法之仁方今天時向熱連日風霾不雨前代常有熱審之例爾部即為通察刑獄其無干牽累者即日釋放餘亦次第減免有死罪情可矜疑者奏請定奪順治十年癸巳六月丁酉上諭内三院曰帝王化民以徳齊民以禮因姦人為惡肆害良善所以不得已而用刑然必情罪允孚斯加之者無悔而受之者無怨故法者天下之平朕亦不得任喜怒為輕重也凡官民犯事朕即有意見不欲遽自裁斷必下部議者以士師之任職在明允而膺斯任者又皆親信大臣必能仰體朕心審察得情不致有錯誤寃濫之失今該部不體朕意私心揣度以為事經上發若從輕擬恐以情面生疑庇䕶獲咎因為自全之計明知此罪本輕故為重入待朕親裁甚至新犯事情不就事論事而追引已結之舊案文致重法如此私心舛謬悖理實甚朕於政事最重刑獄奏讞本章必再三覆閱每有改正但慮日有萬㡬或一時不及致詳竟批依議死者不可復生誤者不可復改此悔此怨咎將誰歸朕志存愛育於饑寒為盜之民尚許自首遐方未服之衆廣示招徕況於有職朝臣無知黎庶即有應得之罪尚不忍加豈肯陷以刻深致滋寃濫以後問理衙門議事大臣問擬人罪務須詳審真情引用本律一切鈎索羅織悉宜痛革書云罪疑惟輕所當深念如情罪重大憲典具存又不得借口故出以致漏網務平心守法使人不寃以㡬刑措之治順治十二年乙未六月丁夘上諭刑部等衙門曰朕日覽三法司章奏議決重囚一日必五六人或十餘人念兹愚氓兵戈災祲之後復罹法網深可憫惻稽古有虞之世民不犯于有司漢文帝唐太宗亦㡬致刑措今犯法者衆豈果風俗日偷民盡暋不畏死歟抑朝廷徳敎未敷故百姓從化無路歟或讞決諸臣膠執爰書輕於失入歟又或所在有司不肯留心化導以致扞綱紛紛歟干和召戾皆朕之責今後爾等問刑諸臣遵奉此諭即將現在未結各案悉心清理原情準法務求平允但不得故縱市恩仍𫝊諭各直省督撫申戒所屬慎重刑獄不得羅織刻覈郡邑長吏亟倡明教化使小民明扵親遜之誼各愛身家毋輕抵罪自然獄案漸減囹圄可空其以仰協天心漸致太平未必不由於此十月戊辰上諭刑部曰帝王以徳化民以刑輔治故律例之設最宜詳慎茍法律輕重失宜則官吏舞文得以任意出入雖欲政平訟理其道無由朕覽讞奏本章引用律例多有未愜爾部所有滿漢字律例作速謄冩進呈朕將詳覽更定頒布遵行順治十七年庚子十一月壬子上諭刑部曰朕覽朝審招冊待決之囚甚衆雖各犯自罹法網國憲難寛但思人命至重概行正法扵心不忍明年嵗次辛丑值皇太后本命年普天同慶朕是以體上天好生之徳特沛解網之仁見在監候各犯概從減等使之創艾省改稱朕刑期無刑嘉與海内維新之意懲貪佞順治八年辛卯閏二月甲寅上諭吏部曰邇来有司貪汚成習皆因督撫不能倡率日甚一日國家紀網首重亷吏若任意妄為不思愛養百姓致令失所殊違朕心督撫任大責重全在舉劾得當使有司知所勸懲今所舉者多屬冒濫所劾者止以微員塞責大貪大惡每多徇縱何禆民生何補吏治爾部須秉公詳察奏聞如有此等惡習定當從重治罪不貸至部院堂官係各司楷模尤當正身潔操砥礪自愛殫心盡職以不負朕惓惓用人求治之意其京堂大小員缺擇有才望堪任者用之嗣後内外各官宜洗心滌慮勤守職業不得仍蹈前弊自取罪戾丁丑上諭都察院曰朝廷治國安民首在嚴懲貪官嚴懲貪官必在審實論罪近見在外督撫巡按㕘劾有司等官原疏贓盈百千及提問報招多坐衙役詐害又云贓無入己夫衙役詐害是誰縱庇贓無入己初劾何據此皆由承問各官私受賄囑督撫巡按又不糾㕘以致部覆將已革之官仍還原職貪何由懲民何由安今後被劾各官審問渉虗係道府㕔開報不實者該部院必查究原開報之官係承問官受私出脫者必查究原承問之官若督撫巡按不先指㕘該部院必行舉奏即以不職論八月己酉原任曹州副將許武光奏言開封前因水淹周王府内有銀二三百萬不止曽被沉壓乞假臣三年之工搜盡天下遺銀以資兵餉上曰帝王生財之道在扵節用愛民掘地求金亘古今未有此議一行生事擾民何可勝言許武光借端求官兼圖牟利殊為不合其令該城御史斥逐順治十年癸巳正月癸巳上幸内院閱吏部大計疏謂大學士范文程等曰貪吏何其多也此輩平時侵漁小民當兹大察之年亦應戒慎文程奏曰彼平居未仕時亦知貪吏不可為一登仕籍則見利智昏矣上曰此由平素不能正心之故也茍識見既明持守有定安能為貨利摇奪乎順治十七年庚子十一月戊寅刑部等衙門覆奏撫臣林起龍懲貪疏上諭曰貪官蠹役害民屢懲弗悛不得不特立嚴法冀人人畏懼省改貪心始不負朕懲貪救民之意今林起龍疏稱近因法重以致人犯抵死不招追贓甚少旋經該部覆議應仍照律擬罪贓追入官以助軍需等語夫與其畏法不招何若使其畏法不貪與其饜足貪腹以贓濟餉何若使其不貪民得豐裕國賦亦充朕明知立法既嚴於貪官蠹吏有所不便必懐怨心但軫念民生即為貪蠹所怨亦不遑恤若不如此貪風何由止息小民何日安生其仍遵前諭行除弊順治十二年乙未四月丙子上諭禮部曰朕惟人臣事君勿欺為本近來進呈登科録及鄉會殿試等卷率多隱匿年嵗以老為壯以壯為少國家開科取士本求賢良進身之始即為虗偽將來行事可知更有相沿陋習輕聨同宗逺託華胄異姓親屬混列刋布俱違正道朝廷用人量才授任豈論年齒家世乎今科進士登科録及以後各試卷務據實供寫其餘陋風悉行改正母負朕崇誠信重㢘恥至意順治十五年戊戍正月甲寅上諭禮部曰朝廷選舉人才科目最重必主考同考官皆正直無私而後真才始得昨因鄉試賄賂公行情罪重大已將李振鄴田耜等特置重辟今㑹試大典尤當慎重考試官同考官及天下舉人若不洗滌肺腸痛絶情弊不重名器不惜身命仍敢交通囑託賄買闗節或被發覺或經科道指㕘即將作弊人等俱照李振鄴等治罪決不姑貸爾部即遍行嚴飭使知朕取士釐姦至意宥過順治十一年甲午二月乙丑上諭吏部曰前因㑹議任珍一事回奏朦混與議各官俱經分别降處朕念諸臣皆係股肱耳目之司朝廷素所優待今循省既久量已改過著各復原銜今後當滌舊圖新各殫忠誠益思報效母負朕期望至意大清世祖體天隆運定統建極英睿欽文顯武大徳𢎞功至仁純孝章皇帝聖訓卷六
