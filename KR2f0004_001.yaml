body:
  text: 欽定四庫全書大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷一論治道順治十年癸巳正月丙申上幸內院閲通鑑諭大學士范文程額色黑寧完我陳名夏等曰上古帝王聖如堯舜固難與比倫其自漢髙以下明代以前何帝為優文程等奏曰漢髙祖文帝光武唐太宗宋太祖明太祖俱屬賢君上曰此數君又孰優名夏奏曰唐太宗似過之上曰朕以為厯代賢君莫如明太祖即唐太宗併數君德政皆有善者有未盡善者至明太祖所定制度章程規畫周詳厯代之君實皆不及也文程等對曰誠如上諭丁酉萬壽節上御太和殿諸王貝勒文武羣臣慶賀賜宴畢召大學士陳名夏至上問曰天下何以治何以亂且何以使國祚長久名夏奏曰皇上如天上心即天心也天下治平惟在皇上欲致天下治平惟在一心心乎治平則治平矣上曰然其道如何名夏奏曰治天下無他道惟在用人得人則治不得人則亂上曰然得人如何名夏奏曰知人甚難然所以知之亦易今誠於羣臣中擇素有德望者常賜召見訪問則天下人心鼓舞無不欲宣力效能者矣上又曰唐朝家法何以不正名夏奏曰由太宗家法未善故致女主擅國禍亂蔓延然貞觀政治可比隆三代惟能用人故耳上又曰人君之有天下非圖逸豫乃身當孜孜愛民以一身治天下也若徒身耽逸樂又安望天下治平惟勤勞其身以茂臻上理譽流青史顧不美歟朕雖勤於圖治豈遂無過失專賴卿等匡其不逮倘朕躬有過慎勿諱言名夏奏曰皇上寵眷諸臣常加誡諭人心大不同於曩時况臣受皇上厚恩豈甘緘默但恐指陳過當耳五月庚午上幸內院問翰林各官何下直太早大學士范文程等奏曰今日端陽是以下直較早上顧謂羣臣曰乘藉天休猥圖安樂人情盡然但欲希宴逸必先習勤勞俾國家大定其樂方永若止圖安樂嗜欲莫遏先計身家而後國是其樂亦暫耳即如朕躬所行兢兢業業期於盡善故每樂聞諸臣之言今之人多有能言而不能行者其故何也今日為之明日易之弗克持久是以不能行耳夫人孰無過知過而改即為善士倘自掩飾謬以為是過乃滋長咎斯甚矣朕與諸臣果能共勤政務裨益民生天必眷之若人之所行不善弗自省改天必降之以殃尚能邀眷佑乎至天不加眷佑而委命於天不知天之譴爾者以爾之不善也豈有爾所行善而天譴之者昔商成湯為盛德之主猶且檢身不及改過不吝若明之正德帝耽志嬉遊怙過不悛徒責善於臣工揆之修已治人之道烏乎可縱使臣工胥善而君不改過遷善何由而向化邪自今以往始自朕躬有過即改卿等亦各宜黽勉勤為啓沃朕將殫力修省焉順治十一年甲午五月甲午端陽節上召內大臣大學士等乘龍舸遊西苑諭諸臣曰舟敝則加修法久則加整一經修整則煥然復新矣馮銓奏曰今之政事皇上勵精圖治自爾日新又新上頷之至北橋登岸幸南臺賜諸臣饌上曰朕甚憫耕牛勞苦不忍食其肉金之俊奏曰皇上恤牛之勞且然况海內百姓乎上與諸臣歡宴至暮還宫順治十二年乙未正月壬子上諭內外文武官員曰朕奉天子民孜孜圖治夙興夜寐罔敢怠荒庶望休息安養漸興教化以奏升平乃疆圉未靖水旱頻仍儲偫不充兵民憔悴流離困苦永念惻然雖恩赦屢頒而奉行無法每思與朕共理天下者惟爾內外文武諸臣是賴已有諭旨自朕躬闕失以及政事未當者俱令各官悉心條奏採擇施行兹以朕思慮所及先頒敕諭令各該管衙門作速遵奉興利除害稱朕祇承天意周恤民隱至懷書不云乎車服以庸從來帝王致治最重民功之賞爾內外諸臣果能殫力宣猷克敷膏澤朕必論功優擢如仍前玩忽誤國殃民定置重典敬天順治十七年庚子二月甲午上諭禮部曰帝王奉天子民禮隆禋祀享帝大典所關尤重必儀物克備乃足昭對越之誠向來郊祀惟冬至用燔柴禮祈穀壇未經舉行雖祀典原有等差而同為祀上帝典禮不宜有異嗣後祈穀亦行燔柴禮聖孝順治八年辛卯正月辛未上諭禮部曰朕聞君德莫先於克孝禮制莫重乎尊親凡帝王纘承鴻業深念劬勞必上徽稱以彰盛典所以隆禮顯孝也恭惟聖母翼贊皇考令德著於宫闈誕育藐躬恩慈勤於顧復獲纘丕緒奄有寰區良由聖母啓迪之所致也爰遵古典博採衆謀擬上昭聖慈壽皇太后尊號恭晉隆禮用展孝思順治十三年丙申正月癸未上諭內三院曰自古平治天下莫大乎孝孝為五常百行之原故曽子備述孔子之言以為孝經昭示後世上自天子下逮庶人至孝之道罔不備焉朕觀其立言正大意旨深逺茍非取古人言行關於孝道者推而廣之不足以彰其義兹欲博採羣言加以論斷勒成一編名曰孝經衍義務俾讀者觀感效法以稱朕孝治天下之意八月壬寅上仰承皇太后慈訓製為內則衍義成書並為序文恭呈聖覽序曰臣聞致治之道有大經大法以儀型乎邦國必有內治內教以模楷乎宫闈故關雎為王化之端乾坤居大易之首聖人垂訓未有不以門內為兢兢者也三代以前聖后賢妃肇修內治以致化行俗美具載典册自非天佑至德孰能集貞淑之大成振古今之懿化哉恭惟聖母皇太后佐我皇考興道致治徽音雍穆慈誨周詳有典有則興仁興讓允為萬世壼教之軌範臣敬遵慈旨搜輯古來嘉言美行統成一編上備披閲下示來兹謹按內則所載皆閨門之內起敬起孝興讓興仁之事而首曰后王命冡宰降德于衆兆民謂此乃王后世子所躬行心得而可為民法者故不言布教而言降德也夫聖人言欲治其國者先齊其家又言家正而天下定齊之正之其惟內則乎世傳后妃紀列女傳家範內訓諸書著作不少然未嘗原本內則而發明之豈所以尊經立教與今是書一本經旨而推衍之微而聲氣容色顯而言動儀文精而樂心養志粗而中饋女工所以操其心而檢其身者施諸一家無不宜放乎四海無不準究其指歸有八要焉孝者順親之要其類有二事舅姑事父母是也敬者內助之要其類有五事夫勸學佐忠贊廉重賢是也教者昌後之要其類有三教子勉學訓忠是也禮者持已之要其類有九敬祭祀肅家政定變守貞殉節端好尚崇儉約謹言慎儀是也讓者睦戚之要其類有四崇謙退和妯娌睦宗族待外戚是也慈者推恩之要其類有五逮下慈幼敦仁愛民宥過是也勤者修業之要其類有二女工飲食是也學者取法之要其類有二好學著書是也每舉一類必證以聖賢經傳之言實以古今淑順之行所採事迹貴賤不同而其道則同所引文辭深淺不一而其理則一闡明大旨詮釋微文名曰內則衍義自禁壼達乎閭巷咸於斯取則焉必皆感發其性情漸摩乎理義廣教化而美風俗宫闈之嘉言懿行直與邦國之大經大法並垂不朽聖母皇太后休聲盛德炳若日星永作則於萬世矣十二月戊戌上諭禮部曰朕考往代典制嵗時致享必於太廟至於晨昏謁見朔望薦新節序告虔聖誕忌辰行禮皆另建有奉先殿今制度未備孝思莫伸朕心歉然爾部即察明舊典具奏順治十四年丁酉十二月丙申上諭戶部曰皇太后聖體違和今已大豫朕心深為欣慰八旗及畿輔人民應加恩賚以洽歡心兹發內帑銀十萬兩一半給八旗兵丁一半遣官賑濟畿輔貧民爾部即遵諭行順治十五年戊戌正月辛酉皇第四子薨生甫四月上召諸內大臣諭曰兹者皇子薨逝爾等將無謂朕因此感傷朕前以皇太后聖體違和時刻憂念今已大豫此真無疆之慶於願至足豈復以此幼子感懷向襄親王薨時尚反覆忖度恐皇太后悼傷勉強抑忍且生死從來定數焉能有違朕念切國家仰副皇太后之心安敢過為傷念亦非強為之詞而有動於中也卿等宜知此意諸臣奏曰臣等正以皇上傷感為慮今聞諭旨不勝歡慰順治十七年庚子三月辛未上諭禮部曰奉先殿祀太祖太宗神位未及并祀四祖於朕孝思未展今詳稽舊制歲終夾祭之外有奉先殿祫祭之例以後元旦皇太后萬壽及朕壽節俱照例祭告奉太廟後殿四祖神主於奉先殿與太祖太宗合享位次照太廟祫祭禮聖學順治十二年乙未三月癸丑上諭內三院曰自古帝王勤學圖治必舉經筵日講以資啓沃今經筵已定於文華殿告成之日舉行而日講深有裨益尤不容緩爾等即選滿漢詞臣學問淹博者八員充日講官侍朕左右以備咨詢謙德順治十四年丁酉正月壬戌禮部奏恭遇萬壽節諸王羣臣應上表行慶賀禮設筵宴上曰朕親政以來數年於兹雨晹未調盜賊未息民困未蘇方切警惕今以生辰受賀彌覺不安至日皇太后儀仗全設朕親詣行禮其諸王羣臣賀表及筵宴俱著停止順治十六年己亥八月辛亥給事中姚延啓奏言皇上文德武功史不勝書請仍加聖號宣示中外上曰人君政事得失全在實行無關稱聖前諭不許稱聖乃朕本懷非虛為粉飾也姚延啓瀆奏不合其嚴飭之節儉順治十五年戊戌六月庚午上諭工部內官監曰和碩榮親王塋殿前有諭旨務從節省爾等須恪遵前諭但期堅固足蔽風雨不必華侈以致勞民倘不體朕心勞民糜費後有見聞治罪不宥警戒順治十年癸巳閏六月庚辰上諭內三院曰考之洪範作肅為時雨之徴天人感應理本不爽朕朝夕乾惕冀迓時和乃兹者霪雨匝月歲事堪憂都城內外積水成渠房舍頽壞薪桂米珠小民艱於居食婦子嗷嗷甚者傾壓致死深可軫念揆厥由來皆朕不德所致朕當一意修省祗懼天戒爾大小臣工俱宜各盡職業共圖消弭京城內外該部確察被災户口據實奏聞在外凡有水災地方督撫察明被災分數具奏請恤以昭朕賑恤窮黎實意順治十三年丙申三月丙午上諭禮部曰朕自親政以來夙夜冰兢罔敢怠忽務求克當天心光昭祖德民安物阜蚤底治平乃近者冬雷春雪隕石雨土所在見告變匪虛生皆朕不德所致朕思天為天下而立君為君者代天敷治必使民物咸若治臻上理然後可以仰答眷命今水旱連年民生困苦是朕有負於上天作君之心一過也祖宗創闢天下以貽子孫為君者念祖宗櫛風沭雨之勞必闡揚光大四海雍熙然後能守祖宗之成憲朕之天下實本於太祖太宗積功纍仁所創垂今強圉未靖徵調頻興是朕有負於祖宗付託之心一過也當睿王攝政之時誅降濫賞屏斥忠良任用姦貪國家錢糧恣意耗費以致百姓嗟怨人人望朕何日親政亟為拯救今經六載雖竭力更新乃猶康乂未奏災祲時聞是朕有負於百姓望治之心一過也用是恐懼靡寧撫躬自責披瀝悃誠冀回災變欲昭告於上帝祖宗實圖省改爾部作速擇吉具奏順治十四年丁酉九月戊辰上諭禮部曰自古變不虛生皆由人事昨日入夜地震有聲朕不勝悚惕因思朕即位十有四年親政已厯七載雖夙夜憂勤勉圖治理但萬幾至繁玩日愒月或至怠荒政事有乖民生未遂以致災譴見告用示警戒朕今痛加修省文武大小羣臣俱當力改前愆協心盡職消弭災異此後朕躬或有闕失行政或有錯謬著內院輔臣據實陳奏毋得隱諱爾部即傳諭遵行大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷一
