body:
  text: 欽定四庫全書大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷三考績順治八年辛卯六月庚午上諭內三院曰年來有司貪惡朕已洞悉故前敇各督撫嚴行分别劾奏不得姑留害民今已閲四五月矣猶然瞻徇未見遵行毋乃負朕振刷之意乎現任督撫久者五六年近亦三四年有司臧否貪亷早當見聞真確何待今日始加考試總由平日以賄賂派索為事貪惡有司厭其欲而扼其吭者有之或八旗舊人在任者咆哮要挾督撫畏忌而不敢彈劾者有之如此貪懦安能糾察宜乎盜賊未盡消而黎民無起色也今復嚴諭凡貪惡及不諳文義縱信胥吏者速行指參至司道乃有司綱領尤宜察劾在內科道官既任言責大而督撫按小而府州縣以及天下弊端凡有見聞即宜參奏勿懷私誣陷勿苟且塞責若仰人顔面拾人津唾即幸免於議寧無愧於心乎順治十年癸巳三月壬辰上敇朝覲各官曰朕所與共圖乂安兆民者惟監司守令是賴往年考績責望於爾等者懇切周詳何爾等之泄泄從事也自朕親政以來更張慮其太驟而皇皇求治之心暴於天下者幾三載矣今又當大計之年而治猶未進民猶未安大者仍不法小者仍不亷致上之德意不下究下之疾苦不上聞此非爾等之過歟朕不勝恫切已嚴飭所司重懲貪酷餘如例降革姑令爾等仍服原官宜各勉力以圖自新毋謂塗飾可以久施毋謂僥幸可以常恃正直存心清亷持已皇天自鑒朝廷自知而民風亦自於變矣爾等如恪遵朕旨以實心行實政庶幾共享和平之福朕之顯秩厚祿自不吝惜如或貌承朕旨心懷詐偽媚上虐下慢政隳操昭昭國憲必貽身家之災雖欲免得乎四月庚子上御太和殿召見天下朝覲官員董天機等諭曰海內黎庶困苦已極兼以旱潦益不聊生招徠撫恤俱惟爾等是賴今司道各官廢弛政務剝削下民種種情弊朕已洞悉兹令爾等仍服原官各宜殫心竭慮改過任事潔己愛民拯救疾苦使德澤下究則天下自致熙皥而于朕委任爾等之意亦可無負矣朕諄諄誡諭爾等聽之於耳存之於心申諭該屬各官恪遵奉行順治十七年庚子二月戊戌上諭吏部曰天下吏治汙隆民生休戚及錢榖兵戎關係封疆諸大務皆委任督撫必督撫實得其人乃足以宣達政教使逺邇乂安見在督撫宜加甄别用示鼓勵爾部即會同都察院將各該督撫任內功過稱職與否詳加察議甄别具奏選舉順治十五年戊戌四月癸酉上御乾清門選庶吉士畢諭諸進士曰朕屢重試典嚴除弊竇者實欲得真才而用之耳今將爾等詳加考試其中能讀書者已選庶吉士餘各照應得品級授職爾等服官必效力王家殫心民社以盡忠藎庶不負朕屢次召見簡用之意亦無忝爾等父母教育之劬勞也尚其勉之誡飭臣下順治九年壬辰十一月乙未上御五鳳樓召六部諸臣諭曰人言各部咸通賄賂朕固知爾等大臣未必至此然曹屬貪汚亦爾等姑息瞻徇不肯舉發之故爾等若果善善惡惡帥之以正則下屬何敢貪汚爾諸臣或屬舊臣或係新拔僉宜體國厚恩堅持忠潔以愛養斯民民安斯國治國治斯君臣同樂矣若仍蹈前轍朕不分從前之有功無功但就現在情罪按法懲治皆爾等自取又或有將部中審結之事稱寃申訴者命復加審鞫並未見爾等引咎申理如此民寃何由得伸國法何由得整復諭吏兵兩部諸臣曰朕聞爾兩部授官凡行賄及私愛者處以腹內善地無賄而憎惡者置之邊逺惡地夫民之休戚視吏之良否如以賄授官則良吏何自而升民生何由而遂自今爾諸部臣宜飭躬率下旌别淑慝以效忠奉職為務十二月癸亥上諭都察院及科道各官曰爾等為朕耳目之官凡官邪民蠧皆得亷實糾發所以通壅蔽鋤黨惡也近如李應試等通盜害民適遇他事發覺窮究根柢立正典刑其未經發覺以前李應試把持衙門毒害小民舉國痛恨爾等職居言路何以默無一言果屬不知已為溺職若惡迹既著憚于舉發養姦長惡之罪夫復何辭爾等自思人臣事君立身行己一秉法度事事為國為民豈容曲庇姦惡姦惡去則民安民安則朕心始安爾等豈不知盡心報效與養姦長惡孰得孰失嗣後各宜省惕以盡職守乃不負朕厚望言官之意也順治十一年甲午正月壬寅上幸內院諭陳名夏吕宫曰朕前聞總督孟喬芳病故深用軫惻不禁淚下喬芳與朕寧有姻戚哉但以其為國忠勤效力故也比年以來朕之眷顧漢官視滿官有加夫滿官自太祖太宗時宣力從征出百死方得至是朕之優待漢官者豈以其有功而然蓋期其既受朕恩必盡忠圖報耳今觀漢官之圖報主恩者何其少邪名夏奏曰君之愛臣如父母之愛子臣不能承順乎君猶子不能承順乎父母也臣等豈無報效之心即有此心皇上或無由洞悉耳上曰數年來徒廑朕懷曽無愈快應升之人得升不思圗報已屬不可不應升者越次簡用亦全不思報反謂已才所致名夏奏曰皇上厚恩無不思報但臣等才庸識淺致有錯失為難必耳上曰錯失何妨與其才髙而不思報國不如才庸而思報國之為愈也倘眀知而不思報效恣意妄行事發決不輕貸毋得自貽伊戚也二月辛未上幸內院諭諸臣曰朕獨理萬幾常恐是非失于偏執故令集衆會議及衆議之時有羣以為是而一人堅執己意謬相爭論者殊屬未合夫既羣以為是即當從之若常懷好勝之心眀知其非而猶強辨不但政事有妨且虧國家大體急宜痛改大學士陳名夏奏曰仰承上諭小事猶煩戒飭若遇大事何敢不謹識於衷以圖改易大學士馮銓奏曰凡謬相爭論者必不自知其非若果知之豈敢如是古云君仁則臣直蓋止欲直陳所見故不覺其言之謬也既承上諭敢不祗遵但恐不自知耳上曰所謂君仁則臣直者所見是而直陳之斯乃直臣也豈飾非強辨之為直乎若執意妄行致蹈重罪朕雖欲寬國法難貸且朕即寬而用之彼亦何顔自立朕之心爾等所知爾等之心朕亦知之君臣一體豈有間乎諭畢大學士額色黑圖海議政內大臣巴哈費揚古等奏曰皇上此諭蓋欲諸臣遇有過失預行省改恐蹈重罪故煩教誨耳俱當悔悟且謹識之三月辛丑上諭吏兵二部曰朝廷設內外諸司所以代天工理庶務無論文武大小各官均有責任若一官不補即曠一官之職近聞官多缺員皆因吏胥作姦朦混沉壓竊弄事權求索賄賂吏胥之弊司官不舉司官之弊堂官不察因循延緩日復一日以致弊竇叢生甚至有頻年困頓流落旅邸不得一官者人才淹抑政事廢弛皆此之故今後爾等兩部堂官務須正已率屬剔弊釐姦各司官務洗心滌慮奉公守法毋得縱役夤緣仍蹈前弊以取罪戾順治十三年丙申二月丙子上在南苑召內院漢大學士翰林及部院尚書以下四品以上諸臣諭曰今人多結朋黨究其結黨之意不過互相攀援以求富貴耳若然是有損而無益也朕常為黨人思之既恐黨類之不合復恐聲名之不聞與往來周旋之不至又恐事發禍隨被人舉首戚戚若此何若為國效忠安受富貴之為榮乎縱使黨與已成及陷誅戮孰能庇免即如誅陳名夏黜龔鼎孳時其黨曽有一人出而救之或分受其過者乎且多有因而下石者是名為朋黨而徒受黨之害也審乎此則何不寢其朋謀而盡力於國家邪三月癸卯上諭六部都察院卿寺科道等官曰朝廷立賢無方不分南北南人中有賢有不肖北人中亦有賢有不肖朕近日處分各官雖多南人皆以事情論非以地方論爾等比肩事主皆當仰體此意凡有論列須從國家起見毋岐方隅毋立門戶毋泄已私忿毋代人誣陷毋以聞風輒告毋以小過苛求務期公忠自矢共底蕩平之治順治十四年丁酉十月乙酉上諭諸臣曰爾等不思朝廷擢用之恩留心部務以圖報效乃徇庇為姦竟成積習此豈人臣之誼嗣後宜痛改前非勉圖效力更宜自愛身名無致隕越且為父母者生子得入仕途必何等教誨何等期望爾等能體父母之意公忠為國仰報朕恩即無忝爾親矣倘違父母教養初心恣意妄行身敗名辱尚得為人類乎凡人妄行非分每謂人不及知為之無害不知幽隱之際尤宜勤自省治至於各官一蒙擢用益當兢兢業業思如何報答主恩如何殫盡職業乃為善類若甫獲升遷即揚揚自得毫無敬畏乃小人也朕所嘉者盡職之人所惡者虗言之輩前因地震朕深自惕勵兼命諸臣共加修省王永吉身為大學士即宜實加修省反虗飾具疏認罪若云具疏則為修省不具疏則不為修省是修省止永吉一人諸臣俱不然矣似此徒博虗名何如盡心實事邪魏裔介為給事中時杜立德己任都給事後擢居總憲立德尚在科員因裔介為給事中時建言可採越衆優升遂至左都御史朕屬望之意非同泛泛邇者陳何嘉謨以副朕懷更定何事以益朕躬邪又諭諸臣曰朕此諭非即欲加罪爾等也特開示朕懷冀爾等改行易慮矢誠效力各勉為良臣耳順治十五年戊戌三月甲辰上諭吏部曰內監吳良輔等交通內外官員作弊納賄罪狀顯著研審情真有王之綱王秉乾結交通賄請託營私良輔等已經供出即行逮問其餘行賄鑽營有見獲名帖書柬者有餽送金銀幣帛者若俱按迹窮究株連甚衆姑從寬免如此情弊朕已洞悉勿謂姦弊隱密竊幸朕不及知嗣後務須痛改前非各供厥職凡交通請託行賄營求諸弊悉宜斷絶如仍蹈前轍作姦犯法者必從重治罪順治十六年己亥三月丁酉上諭吏部曰爾部為六卿之首職司用人凡吏治民生重大事務皆當盡心籌畫詳切覆奏方為不負委任近來爾部一切章疏多拘相沿陋例但云已經具覆在案即各官條陳亦不詳加察議奏明果否可行此皆不肯敬慎存心真實任事只圖草率結局負朕委任至意嗣後若不悉心酌議詳眀覆奏仍前草率定行治罪不貸五月乙丑上諭吏部曰國家用人行政黜陟賞罰一出於公凡為臣子但當砥礪品行奉法盡職不可遇事生疑揣度致開黨與之漸如明末羣臣背公行私黨同伐異恣意揣摩議論紛雜一事施行輒謂出某人意見一人見用輒謂係某人汲引一人被斥輒謂係某人排擠因而互相報復撓亂國政此等陋習為害不小朕甚恨之近來內外大小諸臣中不體朝廷大公至正之意尚有仍踵陋習妄生意度者今後各當洗滌肺腸痛改前非恪修職業共歸蕩平順治十七年庚子二月甲辰上諭吏部等衙門曰國家政務典禮關係重大者必博稽衆論期於至當故令九卿科道會議與議諸臣自應詳酌事理各陳所見以備採擇今會議之時不思殫心籌畫各抒謨猷但希旨依違雷同塞責徒存會議虗名未見少裨治理如合祀一事令衆會議雖理應舉行亦當詳考典制參酌異同各出意見以副朕慎重大典之意乃漫無獻替草率具覆前旨申飭兩議者乃為滿漢區分原未嘗禁其異議嗣後如仍前唯諾從事推諉成風不肯盡心建白定行治罪大清世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖訓卷三
